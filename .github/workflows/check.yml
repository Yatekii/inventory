name: Flake check

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes pipe-operators
            accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - run: nix flake check --all-systems --no-build --show-trace

  evaluate:
    name: Evaluate ${{ matrix.host }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: aiur
            runner: ubuntu-latest
            attr: nixosConfigurations.aiur.config.system.build.toplevel.drvPath
          - host: fenix
            runner: ubuntu-latest
            attr: nixosConfigurations.fenix.config.system.build.toplevel.drvPath
          - host: auraya
            runner: macos-latest
            attr: darwinConfigurations.auraya.system.drvPath
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes pipe-operators
            accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - run: nix eval --raw .#${{ matrix.attr }}
